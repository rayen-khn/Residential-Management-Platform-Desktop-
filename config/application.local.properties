###> symfony/mailer ###
# SMTP configuration for OTP and password reset emails.
# Uses async sending with automatic retry logic - prevents UI blocking.
#
# Gmail Setup (Recommended):
#   1. Enable 2-Step Verification: https://myaccount.google.com/security
#   2. Create App Password: https://myaccount.google.com/apppasswords
#   3. Set MAILER_DSN below with your 16-char app password (not your Gmail password)
#   Format: smtp://your_email@gmail.com:YOUR_16CHAR_APP_PASSWORD@smtp.gmail.com:587
#
# Alternative Port 465 (if 587 timeout):
#   Format: smtps://your_email@gmail.com:YOUR_16CHAR_APP_PASSWORD@smtp.gmail.com:465
#
# Other SMTP Providers:
#   Format: smtp://user:password@smtp.example.com:587 (STARTTLS, port 587)
#   Format: smtps://user:password@smtp.example.com:465 (Implicit SSL, port 465)
#
# For testing (emails not sent, no retries): null://null
#
# Performance Enhancements in this version:
#   ✓ Async email sending - UI never blocks on SMTP timeout
#   ✓ Automatic retry with exponential backoff (1s, 2s, 4s after failures)
#   ✓ Connection pooling - reuses SMTP connection across emails
#   ✓ Email validation - catches invalid addresses before sending
#   ✓ Comprehensive logging - tracks all send attempts and failures
#   ✓ 90s operation timeout - handles slow networks gracefully
#   ✓ DNS timeout control - prevents indefinite DNS hangs
#
# Troubleshooting "Connection timed out: getsockopt":
#   This error means the Java socket cannot connect to smtp.gmail.com
#   Try these fixes in order:
#   1. Try port 465 instead: smtps://email:apppass@smtp.gmail.com:465
#   2. Verify Gmail 2FA + app password at myaccount.google.com/security
#   3. Check Google didn't block suspicious login (check Gmail notifications)
#   4. Verify network outbound port 587/465 is not blocked by firewall
#   5. Test DNS: nslookup smtp.gmail.com (should resolve to IP)
#   6. Run with JAVA_TOOL_OPTIONS=-Dmail.debug=true for detailed SMTP logs
#   7. If still failing, Gmail account may need "Less secure app access" enabled in legacy settings
#
# Troubleshooting "Connection refused":
#   This means the port is wrong or service not listening
#   - For Gmail: ALWAYS use 587 (STARTTLS) or 465 (SSL/smtps)
#   - Verify MAILER_DSN format is correct
#
MAILER_DSN=smtp://syndcati@gmail.com:wmegyuuuapoqggyb@smtp.gmail.com:587
MAILER_FROM_EMAIL=syndcati@gmail.com
MAILER_FROM_NAME=Syndicati
###< symfony/mailer ###

